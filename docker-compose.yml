services:
  # ═══════════════════════════════════════════════════════════════════════════
  # API - Syndra Agent
  # ═══════════════════════════════════════════════════════════════════════════
  
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syndra-api
    
    ports:
      - "8000:8000"
    
    environment:
      # Aplicação
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      
      # Condomínio
      CONDO_NAME: ${CONDO_NAME:-Condomínio SaaS}
      CONDO_CNPJ: ${CONDO_CNPJ}
      
      # LLM
      AGENT_NAME: ${AGENT_NAME:-Syndra}
      AGENT_ROLE: ${AGENT_ROLE:-Assistente Virtual do Condomínio}
      LLM_MODEL: ${LLM_MODEL:-gpt-4-turbo-preview}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      
      # OpenRouter
      USE_OPENROUTER: ${USE_OPENROUTER:-true}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4-turbo-preview}
      
      # OpenAI (alternativa)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      
      # Evolution API (WhatsApp)
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-syndra}
      
      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      
      # Segurança
      SECRET_KEY: ${SECRET_KEY}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
      
      # JWT
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_PERIOD: ${RATE_LIMIT_PERIOD:-60}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      
      # RAG & Embeddings
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-text-embedding-3-small}
      VECTOR_DIMENSION: ${VECTOR_DIMENSION:-1536}
      MAX_CONTEXT_CHUNKS: ${MAX_CONTEXT_CHUNKS:-5}
      
      # Features
      ENABLE_RAG: ${ENABLE_RAG:-true}
      ENABLE_MEMORY: ${ENABLE_MEMORY:-true}
      ENABLE_TOOLS: ${ENABLE_TOOLS:-true}
      ENABLE_AUDIT_LOG: ${ENABLE_AUDIT_LOG:-true}
    
    depends_on:
      - redis
    
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    
    networks:
      - syndra-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
    restart: unless-stopped
    
    labels:
      - "com.syndra.app=api"
      - "com.syndra.version=2.0.0"

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis - Cache & Sessions
  # ═══════════════════════════════════════════════════════════════════════════
  
  redis:
    image: redis:7-alpine
    container_name: syndra-redis
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    networks:
      - syndra-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    restart: unless-stopped
    
    labels:
      - "com.syndra.app=redis"

  # ═══════════════════════════════════════════════════════════════════════════
  # Evolution API (opcional - para desenvolvimento local)
  # ═══════════════════════════════════════════════════════════════════════════
  
  # Descomentar se quiser rodar Evolution API localmente
  # evolution:
  #   image: atendimento/evolution-api:latest
  #   container_name: syndra-evolution
  #   
  #   ports:
  #     - "8080:8080"
  #   
  #   environment:
  #     NODE_ENV: production
  #     SERVER_PORT: 8080
  #   
  #   volumes:
  #     - evolution-data:/app/data
  #   
  #   networks:
  #     - syndra-network
  #   
  #   restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # Nginx - Reverse Proxy (para produção)
  # ═══════════════════════════════════════════════════════════════════════════
  
  # nginx:
  #   image: nginx:alpine
  #   container_name: syndra-nginx
  #   
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   
  #   depends_on:
  #     - api
  #   
  #   networks:
  #     - syndra-network
  #   
  #   restart: unless-stopped
  #   
  #   labels:
  #     - "com.syndra.app=nginx"
  #   
  #   profiles:
  #     - "production"

# ═══════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════

volumes:
  redis-data:
    driver: local
  evolution-data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════

networks:
  syndra-network:
    driver: bridge
